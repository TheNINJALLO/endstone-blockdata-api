<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Endstone BlockData API Wiki</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Technical documentation and Wiki for Endstone BlockData API">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #10b981;
    }
    body {
      background-color: #0f172a;
      color: #f8fafc;
    }
    .sidebar {
      background-color: #1e293b;
      color: #94a3b8;
    }
    .markdown-section code {
      background-color: #334155;
      color: #38bdf8;
    }
  </style>
</head>
<body>
  <div id="app">Loading Endstone BlockData API Wiki...</div>
  <script>
    window.$docsify = {
      name: 'Endstone BlockData API',
      repo: 'https://github.com/TheNINJALLO/endstone-blockdata-api',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: 'Search documentation...',
        noData: 'No results found',
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-cpp.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
